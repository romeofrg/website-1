<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folientechnik Sonntag | Modern Wrapping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        [x-cloak] { display: none !important; }
        /* Sicherstellen, dass der Body nicht scrollt, wenn das Menü offen ist */
        .no-scroll { overflow: hidden !important; }
    </style>
</head>
<body x-data="{ 
    scrolled: false, 
    data: {}, 
    activeTab: 0,
    mobileMenu: false,
    async init() {
        try {
            const response = await fetch('data.json');
            this.data = await response.json();
        } catch (e) {
            console.error('Daten konnten nicht geladen werden');
        }
    }
}" 
@scroll.window="scrolled = (window.pageYOffset > 50)" 
:class="mobileMenu ? 'no-scroll' : ''"
x-cloak 
class="bg-black text-white">

    <!-- Navigation -->
    <nav :class="scrolled ? 'glass py-3' : 'py-5 lg:py-8'" 
         class="fixed top-0 left-0 w-full z-[100] transition-all duration-500 px-4 lg:px-20 flex justify-between items-center">
        
        <!-- Logo - Bleibt über dem Overlay durch z-120 -->
        <a href="#" class="block z-[120]">
            <img src="logo.png" 
                 alt="Folientechnik Sonntag" 
                 :class="scrolled ? 'h-8 lg:h-10' : 'h-10 lg:h-14'" 
                 class="w-auto transition-all duration-500 object-contain">
        </a>
        
        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center space-x-10 text-xs font-bold uppercase tracking-widest">
            <a href="#services" class="hover:text-[var(--accent)] transition text-white">Leistungen</a>
            <a href="#kontakt" class="hover:text-[var(--accent)] transition text-white">Kontakt</a>
            <a href="#kontakt" class="bg-white text-black px-6 py-2 rounded-full hover:bg-[var(--accent)] hover:text-white transition-colors uppercase">Anfrage</a>
        </div>

        <!-- Mobile Menu Button - Bleibt über dem Overlay durch z-120 -->
        <button @click="mobileMenu = !mobileMenu" class="md:hidden z-[120] text-white focus:outline-none p-2">
            <template x-if="!mobileMenu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
                </svg>
            </template>
            <template x-if="mobileMenu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </template>
        </button>

        <!-- Fixed Mobile Overlay - Der Fix gegen das "Durchscheinen" im Footer -->
        <div x-show="mobileMenu" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 w-full h-screen flex flex-col items-center justify-center md:hidden"
             style="position: fixed !important; top: 0 !important; left: 0 !important; background-color: #000000 !important; z-index: 110 !important;">
            
            <div class="flex flex-col items-center space-y-12 text-2xl font-bold uppercase tracking-[0.2em]">
                <a href="#services" @click="mobileMenu = false" class="text-white hover:text-[var(--accent)] transition">Leistungen</a>
                <a href="#kontakt" @click="mobileMenu = false" class="text-white hover:text-[var(--accent)] transition">Kontakt</a>
                <a href="#kontakt" @click="mobileMenu = false" 
                   style="border-color: var(--accent); color: var(--accent);" 
                   class="border-2 px-12 py-4 rounded-full transition active:bg-[var(--accent)] active:text-black">
                   Anfrage
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-[url('home1.png')] bg-cover bg-center opacity-30 scale-110"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-black"></div>
        
        <div class="relative z-10 text-center px-6">
            <span class="inline-block px-4 py-1 glass rounded-full text-[10px] lg:text-xs font-bold tracking-widest mb-6 animate__animated animate__fadeInDown text-[var(--accent)]">PREMIUM FOLIERUNG</span>
            <h1 class="text-5xl md:text-7xl lg:text-9xl font-black gradient-text animate__animated animate__zoomIn leading-tight uppercase">Wrap It.</h1>
            <p class="mt-6 text-gray-400 max-w-xl mx-auto text-base lg:text-lg italic" x-text="'Meisterhafte ' + (data.company?.full || 'Folientechnik')"></p>
        </div>
    </section>

    <!-- Interactive Services -->
    <section id="services" class="py-20 lg:py-32 px-6 lg:px-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20">
            <div class="order-2 lg:order-1">
                <h2 class="text-3xl lg:text-5xl font-black mb-8 lg:mb-12 italic text-white uppercase">Unsere<br><span style="color: var(--accent)">Expertise.</span></h2>
                <div class="space-y-4">
                    <template x-for="(service, index) in data.services" :key="index">
                        <div @click="activeTab = index" 
                             :class="activeTab === index ? 'glass border-[var(--accent)] translate-x-2 lg:translate-x-4' : 'opacity-40 hover:opacity-70'"
                             class="p-4 lg:p-6 rounded-2xl cursor-pointer transition-all duration-500 service-card border border-transparent">
                            <div class="flex justify-between items-center">
                                <h3 class="text-xl lg:text-2xl font-bold uppercase text-white" x-text="service.title"></h3>
                                <span style="color: var(--accent)" class="font-mono text-sm lg:text-base" x-text="'0' + (index + 1)"></span>
                            </div>
                            <p class="mt-4 text-gray-300 text-sm lg:text-base" x-show="activeTab === index" x-transition.opacity x-text="service.desc"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Dynamic Image Display -->
            <div class="relative h-[350px] lg:h-[600px] rounded-3xl overflow-hidden glass order-1 lg:order-2">
                <template x-for="(service, index) in data.services" :key="index">
                    <img :src="service.img" 
                         x-show="activeTab === index" 
                         x-transition:enter="transition ease-out duration-500"
                         x-transition:enter-start="opacity-0 scale-110"
                         x-transition:enter-end="opacity-100 scale-100"
                         class="absolute inset-0 w-full h-full object-cover grayscale-[0.3] hover:grayscale-0 transition-all duration-700" 
                         alt="Work">
                </template>
                <div class="absolute bottom-6 left-6 lg:bottom-10 lg:left-10 z-20">
                    <p class="text-[10px] tracking-widest uppercase opacity-60 text-white">Status: Exzellenz</p>
                    <h4 class="text-xl lg:text-3xl font-black italic text-white" x-text="data.services?.[activeTab]?.short"></h4>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact & Footer -->
    <footer id="kontakt" class="bg-black pt-20 lg:pt-32 pb-10 px-6 lg:px-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-20 border-b border-white/10 pb-16 lg:pb-20">
            <div>
                <h2 class="text-3xl lg:text-4xl font-bold mb-8 text-white uppercase">Bereit für<br>etwas Neues?</h2>
                <div class="space-y-6 text-lg lg:text-xl text-white">
                    <p class="flex flex-col">
                        <span class="text-[10px] uppercase text-gray-500 mb-1">Besuchen Sie uns</span>
                        <span x-text="data.company?.address"></span>
                        <span x-text="data.company?.city"></span>
                    </p>
                    <p class="flex flex-col">
                        <span class="text-[10px] uppercase text-gray-500 mb-1">Rufen Sie an</span>
                        <a :href="'tel:' + data.company?.phone" class="hover:text-[var(--accent)] transition w-fit" x-text="data.company?.phone"></a>
                    </p>
                </div>
            </div>
            <div class="glass p-6 lg:p-10 rounded-3xl">
                <h3 class="text-xl lg:text-2xl font-bold mb-6 text-white uppercase">Direktanfrage</h3>
                <form class="space-y-4">
                    <input type="text" placeholder="Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-[var(--accent)] text-white outline-none transition text-sm">
                    <input type="email" placeholder="E-Mail" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-[var(--accent)] text-white outline-none transition text-sm">
                    <textarea placeholder="Was möchten Sie folieren?" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl h-32 focus:border-[var(--accent)] text-white outline-none transition text-sm"></textarea>
                    <button type="button" style="background-color: var(--accent)" class="w-full text-black py-4 rounded-xl font-bold hover:brightness-110 transition uppercase tracking-widest text-sm">Anfrage Absenden</button>
                </form>
            </div>
        </div>
        <div class="mt-10 flex flex-col lg:flex-row justify-between items-center gap-4 text-[10px] text-gray-600 uppercase tracking-widest text-center">
            <p x-text="'© 2026 ' + (data.company?.full || '')"></p>
            <div class="flex space-x-6 text-white">
                <a href="#" class="hover:text-[var(--accent)] transition">Impressum</a>
                <a href="#" class="hover:text-[var(--accent)] transition">Datenschutz</a>
            </div>
        </div>
    </footer>

</body>
</html>
